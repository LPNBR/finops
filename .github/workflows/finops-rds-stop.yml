name: FinOps - Stop RDS POC

on:
  schedule:
  # Executa todos os dias às 08h UTC
  - cron: "0 8 * * *"

  # Executa todos os dias às 20h UTC
  - cron: "0 20 * * *"

  workflow_dispatch:

jobs:
  stop-rds:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Check and stop RDS
        run: |
          DB_ID="poc-ai-monitoring-mysql"

          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "$DB_ID" \
            --query "DBInstances[0].DBInstanceStatus" \
            --output text)

          echo "RDS status atual: $STATUS"

          if [ "$STATUS" = "available" ]; then
            echo "RDS está ligado. Parando..."
            aws rds stop-db-instance \
              --db-instance-identifier "$DB_ID"
          else
            echo "RDS não está available. Nenhuma ação necessária."
          fi
