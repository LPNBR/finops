name: FinOps - Start AWS POC

on:
  workflow_dispatch:

jobs:
  start-poc:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      EC2_INSTANCE_ID: i-09ede75ab466e60c5
      RDS_INSTANCE_ID: poc-ai-monitoring-mysql
      LAMBDA_FUNCTION_NAME: poc-ai-monitoring-agent
      EVENTBRIDGE_RULE_NAME: poc-ai-monitoring-alarm-state-change

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start EC2 if stopped
        run: |
          STATUS=$(aws ec2 describe-instances \
            --instance-ids "$EC2_INSTANCE_ID" \
            --query "Reservations[0].Instances[0].State.Name" \
            --output text)

          echo "EC2 status atual: $STATUS"

          if [ "$STATUS" = "stopped" ]; then
            aws ec2 start-instances --instance-ids "$EC2_INSTANCE_ID"
            echo "EC2 enviada para start."
          else
            echo "EC2 não está stopped. Nenhuma ação necessária."
          fi

      - name: Start RDS if stopped
        run: |
          STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier "$RDS_INSTANCE_ID" \
            --query "DBInstances[0].DBInstanceStatus" \
            --output text)

          echo "RDS status atual: $STATUS"

          if [ "$STATUS" = "stopped" ]; then
            aws rds start-db-instance --db-instance-identifier "$RDS_INSTANCE_ID"
            echo "RDS enviada para start."
          else
            echo "RDS não está stopped. Nenhuma ação necessária."
          fi

      - name: Enable EventBridge rule
        run: |
          aws events enable-rule --name "$EVENTBRIDGE_RULE_NAME"
          echo "EventBridge rule habilitada."

      - name: Restore Lambda concurrency
        run: |
          aws lambda delete-function-concurrency \
            --function-name "$LAMBDA_FUNCTION_NAME"

          echo "Lambda concurrency restaurada."

      - name: Enable CloudWatch alarm actions
        run: |
          ALARMS=$(aws cloudwatch describe-alarms \
            --query "MetricAlarms[?contains(AlarmName, 'poc-ai-monitoring')].AlarmName" \
            --output text)

          if [ -n "$ALARMS" ]; then
            aws cloudwatch enable-alarm-actions --alarm-names $ALARMS
            echo "Alarm actions habilitadas: $ALARMS"
          else
            echo "Nenhum alarme poc-ai-monitoring encontrado."
          fi

      - name: Final validation
        run: |
          echo "===== FINOPS START VALIDATION ====="

          aws ec2 describe-instances \
            --instance-ids "$EC2_INSTANCE_ID" \
            --query "Reservations[].Instances[].{InstanceId:InstanceId,State:State.Name,Type:InstanceType}" \
            --output table

          aws rds describe-db-instances \
            --db-instance-identifier "$RDS_INSTANCE_ID" \
            --query "DBInstances[].{DB:DBInstanceIdentifier,Status:DBInstanceStatus,Class:DBInstanceClass}" \
            --output table

          aws events describe-rule \
            --name "$EVENTBRIDGE_RULE_NAME" \
            --query "{Name:Name,State:State}" \
            --output table

          aws cloudwatch describe-alarms \
            --query "MetricAlarms[?contains(AlarmName, 'poc-ai-monitoring')].{Alarm:AlarmName,ActionsEnabled:ActionsEnabled,State:StateValue}" \
            --output table

          echo "===== VALIDATION FINISHED ====="